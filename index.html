<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A modern, web-based Pomodoro timer designed to boost productivity.">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <div class="timer-card">
      <h1 class="visually-hidden">Pomodoro Timer</h1>
      <div class="timer-display" id="time-display" aria-live="polite">25:00</div>
      
      <div class="controls">
        <button id="start-btn" class="btn primary" aria-label="Start Timer">Start</button>
        <button id="reset-btn" class="btn secondary" aria-label="Reset Timer">Reset</button>
      </div>
    </div>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
